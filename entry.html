<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Notes From the Field</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grain"></div>

<header>
  <div class="wrap">
    <nav>
      <a href="index.html" class="wordmark">field<span class="accent">/</span>notes <span class="by">by</span> <span class="accent">Timothy Castillon</span></a>
      <div class="navlinks">
        <a href="index.html#journal">Journal</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>
      </div>
    </nav>
  </div>
</header>

<div class="wrap">
  <div class="entry-page-head">
    <a class="back-link" href="index.html#journal">&larr; Back to the Journal</a>
    <div id="entry-root">Loading…</div>
  </div>
</div>

<footer>
  <div class="wrap footer-grid">
    <div class="wordmark">field<span class="accent">/</span>notes</div>
    <p class="footer-note">Updated after every trip. Prints and licensing available on request.</p>
  </div>
</footer>

<div class="lightbox" id="lightbox">
  <div class="lightbox-close" id="lightbox-close">Close ✕</div>
  <img id="lightbox-img" src="" alt="">
</div>

<script src="entries.js"></script>
<script>
  function renderEntry() {
    if (typeof ENTRIES === 'undefined' || !Array.isArray(ENTRIES)) {
      throw new Error('ENTRIES is missing or invalid -- check entries.js for a syntax error.');
    }
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');
    const entry = ENTRIES.find(e => e.slug === slug);
    const root = document.getElementById('entry-root');

    if (!entry) {
      root.innerHTML = `<p style="color:var(--ink-muted); font-family:'IBM Plex Mono',monospace; font-size:14px;">
        No entry found for "${slug || ''}". <a href="index.html#journal" style="color:var(--gold);">Back to the journal.</a></p>`;
      return;
    }

    document.getElementById('page-title').textContent = `${entry.title} — Notes From the Field`;

    const frames = Array.from({ length: entry.count }, (_, i) => {
      const n = String(i + 1).padStart(2, '0');
      return `<div class="frame" data-frame="${entry.slug.toUpperCase().slice(0,3)}-${n}" tabindex="0">
                <img src="images/${entry.slug}/${n}.jpg" alt="${entry.title}, frame ${n}" loading="lazy">
              </div>`;
    }).join('');

    root.innerHTML = `
      <div class="entry-head" style="margin-bottom:40px;">
        <div class="entry-meta">
          ${entry.date}
          <span class="loc">${entry.coords}</span>
          <span class="loc">${entry.location}</span>
        </div>
        <div>
          <h1 class="entry-title">${entry.title}</h1>
          <p class="entry-desc">${entry.description}</p>
          <div class="card-tags" style="margin-top:18px;">${(entry.tags || []).map(t => `<span>${t}</span>`).join('')}</div>
        </div>
      </div>
      <div class="contact-sheet" style="margin-left:0;">${frames}</div>
    `;

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    document.addEventListener('click', (e) => {
      const frame = e.target.closest('.frame');
      if (frame) {
        const img = frame.querySelector('img');
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        lightbox.classList.add('open');
      }
    });
    document.getElementById('lightbox-close').addEventListener('click', () => lightbox.classList.remove('open'));
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.classList.remove('open'); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') lightbox.classList.remove('open'); });
  }

  try {
    renderEntry();
  } catch (err) {
    document.getElementById('entry-root').innerHTML = `
      <div style="padding:24px; font-family:'IBM Plex Mono', monospace; font-size:13px; color:#d3a24e; border:1px solid #1c3552; border-radius:4px;">
        Couldn't load this entry. Likely a syntax error in entries.js. Check the browser console (F12).<br><br>Error: ${err.message}
      </div>`;
    console.error(err);
  }
</script>

</body>
</html>
